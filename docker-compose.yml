# Backend: desde carpeta backend (uvicorn main:app)
# Frontend: desde raíz (npm start → puerto 3008)
# Levantar: docker compose up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    # Variables de BD solo desde backend/.env (copiar desde backend/.env.example).
    # Si PostgreSQL corre en tu PC, usá host.docker.internal como host (ej. DB_CID_HOST=host.docker.internal).
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Local Docker: dejá por defecto → app en http://localhost:3008/
        # Producción: REACT_APP_API_URL=https://sistemas.mopc.gov.py/api PUBLIC_URL=/perfiles_especiales/
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://127.0.0.1:8011}
        PUBLIC_URL: ${PUBLIC_URL:-}
    ports:
      - "3008:3008"
    depends_on:
      - backend
