<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Transporte Urbano - Gran Asunción</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #1e40af;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        .content {
            display: flex;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .content {
                flex-direction: row;
            }
        }

        .sidebar {
            background: white;
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
            padding: 15px;
            border-right: 1px solid #cbd5e1;
        }

        @media (min-width: 768px) {
            .sidebar {
                width: 320px;
                max-height: none;
                overflow-y: auto;
            }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .selector {
            margin-bottom: 15px;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            background-color: #f1f5f9;
            margin-bottom: 10px;
        }

        .search-box {
            position: relative;
        }

        .search-button {
            position: absolute;
            right: 0;
            top: 0;
            background: #1e40af;
            color: white;
            border: none;
            height: 100%;
            padding: 0 15px;
            border-top-right-radius: 5px;
            border-bottom-right-radius: 5px;
            cursor: pointer;
        }

        .list-container {
            margin-bottom: 15px;
        }

        .list-header {
            font-weight: bold;
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid #cbd5e1;
        }

        .list-item {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .list-item:hover {
            background-color: #e5edff;
        }

        .list-item.active {
            background-color: #e5edff;
        }

        .origin-destination {
            background: white;
            padding: 15px;
            border-top: 1px solid #cbd5e1;
        }

        .origin-destination h3 {
            margin-bottom: 10px;
        }

        .origin-destination-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #64748b;
        }

        .search-route-btn {
            background-color: #1e40af;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }

        .search-route-btn:hover {
            background-color: #1e3a8a;
        }

        /* Estilos para modo móvil */
        .mobile-tabs {
            display: flex;
            background: #e5edff;
            border-bottom: 1px solid #cbd5e1;
        }

        @media (min-width: 768px) {
            .mobile-tabs {
                display: none;
            }
        }

        .mobile-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
        }

        .mobile-tab.active {
            background: white;
            border-bottom: 2px solid #1e40af;
            font-weight: bold;
        }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e40af;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Sistema de Transporte Urbano - Gran Asunción - Viceministerio de Transporte(MOPC)</h1>
        </header>

        <div class="mobile-tabs">
            <div class="mobile-tab active" data-tab="info">Información</div>
            <div class="mobile-tab" data-tab="map">Mapa</div>
        </div>

        <div class="content">
            <div class="sidebar">
                <div class="selector">
                    <label for="empresa-select">Seleccione una empresa:</label><br><br>
                    <select id="empresa-select">
                        <option value="">Cargando empresas...</option>
                    </select>
                </div>

                <div class="search-box">
                    <input type="text" id="search-line" placeholder="Buscar por línea...">
                    <button class="search-button">🔍</button>
                </div>
                <div class="itinerarios">
                    <h3>Itinerarios:</h3>
                    <ul id="itinerarios-list">
                        <li><em>Seleccione una empresa para ver sus itinerarios</em></li>
                    </ul>
                </div>


                <div class="list-container">
                    <div class="list-header">Paradas</div>
                    <div id="paradas-list">
                        <!-- Las paradas se cargarán dinámicamente -->
                        <div class="loader" id="loader-paradas"></div>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="map-container">
                    <div id="map"></div>
                </div>

                <div class="origin-destination">
                    <h3>Buscar Conexión</h3>
                    <div class="origin-destination-inputs">
                        <div class="input-group">
                            <label for="origen">Origen:</label>
                            <input type="text" id="origen" placeholder="Ingrese punto de origen">
                        </div>
                        <div class="input-group">
                            <label for="destino">Destino:</label>
                            <input type="text" id="destino" placeholder="Ingrese punto de destino">
                        </div>
                        <button class="search-route-btn">Buscar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="alerta" class="alert"></div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script>
        // Función para mostrar mensajes de error
        const empresaSelect = document.getElementById('empresa-select');
        const itinerariosList = document.getElementById('itinerarios-list');
        // Función para mostrar mensajes de aviso
        function mostrarAviso(mensaje, tipo = 'info') {
            const alerta = document.getElementById('alerta');
            alerta.textContent = mensaje;
            alerta.className = 'alert ' + tipo;
            alerta.style.display = 'block';

            setTimeout(() => {
                alerta.style.display = 'none';
            }, 5000); // se oculta luego de 3 segundos
        }

        // Coordenadas de las ciudades
        const ciudades = [
            { nombre: "Asunción", lat: -25.2944, lng: -57.6324 },
            { nombre: "Luque", lat: -25.2686, lng: -57.4906 },
            { nombre: "San Lorenzo", lat: -25.3386, lng: -57.5088 },
            { nombre: "Lambaré", lat: -25.3468, lng: -57.6063 },
            { nombre: "Fernando de la Mora", lat: -25.3164, lng: -57.5217 },
            { nombre: "Capiatá", lat: -25.3551, lng: -57.4249 },
            { nombre: "Ñemby", lat: -25.3935, lng: -57.5371 },
            { nombre: "Villa Elisa", lat: -25.3667, lng: -57.5833 },
            { nombre: "Mariano Roque Alonso", lat: -25.2095, lng: -57.5429 },
            { nombre: "Ypané", lat: -25.4141, lng: -57.4886 }
        ];

        // Inicialización del mapa y marcadores
        document.addEventListener('DOMContentLoaded', function () {
            // Inicializar el mapa
            var map = L.map('map').setView([-25.2944, -57.6324], 11);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Marcadores de ciudades
            ciudades.forEach(ciudad => {
                L.marker([ciudad.lat, ciudad.lng])
                    .addTo(map)
                    .bindPopup(ciudad.nombre);
            });

            // Variables para gestionar las capas del mapa
            let currentParadasLayer = null;
            let currentRouteLayer = null;

            // Cargar el selector de empresas
            fetch('http://localhost:3000/empresas') //Me conecto a la API
                // fetch('http://localhost:8000/empresas') //Me conecto a la API
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('empresa-select'); // Selecciono el elemento
                    select.innerHTML = '<option value="">Seleccione una empresa</option>'; // Limpio el select
                    data.forEach(empresa => {  // Recorro los datos
                        const option = document.createElement('option') // Creo una opción;
                        option.value = empresa.id_eot_vmt_hex || 'sin_id'; // Asigno el id
                        option.textContent = empresa.eot_nombre || 'Sin nombre'; // Asigno el nombre

                        select.appendChild(option); // Agrego la opción al select
                    });
                })
                .catch(err => {
                    console.error('Error al cargar empresas:', err);
                    document.getElementById('empresa-select').innerHTML = '<option>Error al cargar</option>';
                });
            document.getElementById('empresa-select').addEventListener('change', (e) => {
                if (e.target.value) {
                    mostrarAviso("Empresa seleccionada correctamente", "success");
                };
            });

            // Funcionalidad para mostrar itinerarios al seleccionar empresa
            empresaSelect.addEventListener('change', function () {
                const empresaId = this.value; // No uses parseInt si es hex
                const itinerariosList = document.getElementById('itinerarios-list');
                // Limpiar lista de itinerarios y paradas
                itinerariosList.innerHTML = '';
                document.getElementById('paradas-list').innerHTML = '';

                if (empresaId) {
                    if (sidebar) {
                        sidebar.style.display = 'block';
                    }
                    if (mapContainer) {
                        mapContainer.style.display = 'none';
                    }
                    //document.getElementById('loader-itinerarios').style.display = 'block';

                    fetch(`http://localhost:3000/empresas/${empresaId}/itinerarios`)
                        .then(response => response.json())
                        .then(itinerarios => {
                            document.getElementById('loader-itinerarios').style.display = 'none';

                            try {
                                if (itinerarios.length === 0) {
                                    itinerariosList.innerHTML = '<div class="list-item">Sin itinerarios disponibles</div>';
                                    return;
                                }

                                itinerarios.forEach(itinerario => {
                                    const div = document.createElement('div');
                                    div.className = 'list-item';
                                    div.textContent = `Línea ${itinerario.linea ?? 'N/D'} - Ramal ${itinerario.ramal ?? ''}: ${itinerario.origen ?? ''} → ${itinerario.destino ?? ''}`;
                                    div.dataset.id = itinerario.ruta_hex;

                                    div.addEventListener('click', function () {
                                        document.querySelectorAll('#itinerarios-list .list-item').forEach(item => {
                                            item.classList.remove('active');
                                        });
                                        this.classList.add('active');
                                        // mostrarParadas(itinerario.ruta_hex);
                                    });

                                    itinerariosList.appendChild(div);
                                });
                            } catch (error) {
                                console.error('Error al procesar itinerarios:', error);
                                itinerariosList.innerHTML = '<div class="list-item">Error al procesar itinerarios</div>';
                            }
                        })
                        .catch(error => {
                            console.error('Error al obtener itinerarios:', error);
                            document.getElementById('loader-itinerarios').style.display = 'none';
                            itinerariosList.innerHTML = '<div class="list-item">Error al cargar itinerarios</div>';
                        });
                }
            });

            // Función para mostrar paradas al seleccionar un itinerario
            function mostrarParadas(itinerarioId) {
                const paradasList = document.getElementById('paradas-list');
                paradasList.innerHTML = '';

                document.getElementById('loader-paradas').style.display = 'block';

                // Limpiar rutas y paradas anteriores del mapa
                if (currentParadasLayer) {
                    map.removeLayer(currentParadasLayer);
                }

                if (currentRouteLayer) {
                    map.removeLayer(currentRouteLayer);
                }

                setTimeout(() => {
                    document.getElementById('loader-paradas').style.display = 'none';

                    const paradas = paradasData[itinerarioId] || [];
                    const markers = [];
                    const points = [];

                    paradas.forEach(parada => {
                        // Agregar a la lista
                        const div = document.createElement('div');
                        div.className = 'list-item';
                        div.textContent = parada.nombre;
                        div.dataset.id = parada.id;
                        div.dataset.lat = parada.lat;
                        div.dataset.lng = parada.lng;

                        div.addEventListener('click', function () {
                            // Centrar mapa en esta parada
                            map.setView([parada.lat, parada.lng], 15);
                        });

                        paradasList.appendChild(div);

                        // Guardar coordenadas para el marcador y la ruta
                        markers.push(L.marker([parada.lat, parada.lng])
                            .bindPopup(parada.nombre));
                        points.push([parada.lat, parada.lng]);
                    });

                    // Agregar marcadores de paradas al mapa
                    currentParadasLayer = L.layerGroup(markers).addTo(map);

                    // Dibujar ruta entre paradas
                    if (points.length > 1) {
                        currentRouteLayer = L.polyline(points, { color: 'blue' }).addTo(map);
                        // Zoom para ver toda la ruta
                        map.fitBounds(currentRouteLayer.getBounds());
                    }
                }, 500);
            }

            // Buscador de líneas
            const searchButton = document.querySelector('.search-button');
            const searchInput = document.getElementById('search-line');

            searchButton.addEventListener('click', buscarLinea);
            searchInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    buscarLinea();
                }
            });

            function buscarLinea() {
                const searchTerm = searchInput.value.toLowerCase();
                if (!searchTerm) return;

                let found = false;

                // Buscar en todas las empresas
                for (const empresaId in itinerariosData) {
                    const itinerarios = itinerariosData[empresaId];

                    for (const itinerario of itinerarios) {
                        if (itinerario.nombre.toLowerCase().includes(searchTerm)) {
                            // Seleccionar empresa
                            empresaSelect.value = empresaId;
                            empresaSelect.dispatchEvent(new Event('change'));

                            // Esperar a que se carguen los itinerarios
                            setTimeout(() => {
                                // Seleccionar itinerario
                                const itinerarioElement = document.querySelector(`#itinerarios-list .list-item[data-id="${itinerario.id}"]`);
                                if (itinerarioElement) {
                                    itinerarioElement.click();
                                    found = true;
                                }
                            }, 600);

                            // Solo seleccionamos el primer resultado que encontremos
                            break;
                        }
                    }

                    if (found) break;
                }

                if (!found) {
                    alert('No se encontraron líneas que coincidan con la búsqueda.');
                }
            }

            // Funcionalidad para buscar rutas entre origen y destino
            const buscarRutaBtn = document.querySelector('.search-route-btn');

            buscarRutaBtn.addEventListener('click', function () {
                const origen = document.getElementById('origen').value;
                const destino = document.getElementById('destino').value;

                if (!origen || !destino) {
                    alert('Por favor ingrese tanto origen como destino.');
                    return;
                }

                // Esta es una simulación simple. En producción, habría que consultar una API
                // que calcule la ruta óptima según las paradas más cercanas.
                alert(`Buscando ruta desde ${origen} hasta ${destino}.\n\nEsta funcionalidad requiere implementación del backend para encontrar paradas cercanas y rutas óptimas.`);

                // Aquí iría la lógica real de búsqueda de rutas
                // 1. Encontrar coordenadas de origen y destino (geocodificación)
                // 2. Encontrar paradas cercanas a origen y destino
                // 3. Encontrar itinerarios que conecten esas paradas
                // 4. Mostrar en el mapa la ruta completa
            });

            // Control de tabs para móvil
            const mobileTabs = document.querySelectorAll('.mobile-tab');
            const sidebar = document.querySelector('.sidebar');
            const mapContainer = document.querySelector('.map-container');

            mobileTabs.forEach(tab => {
                tab.addEventListener('click', function () {
                    mobileTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');

                    if (this.dataset.tab === 'info') {
                        sidebar.style.display = 'block';
                        mapContainer.style.display = 'none';
                    } else {
                        sidebar.style.display = 'none';
                        mapContainer.style.display = 'block';
                        // Refrescar el mapa cuando se hace visible
                        map.invalidateSize();
                    }
                });
            });

            // En escritorio, ambos son visibles
            function checkWidth() {
                if (window.innerWidth >= 768) {
                    sidebar.style.display = 'block';
                    mapContainer.style.display = 'block';
                    map.invalidateSize();
                } else {
                    // En móvil, aplicar el tab activo
                    const activeTab = document.querySelector('.mobile-tab.active');
                    if (activeTab.dataset.tab === 'info') {
                        sidebar.style.display = 'block';
                        mapContainer.style.display = 'none';
                    } else {
                        sidebar.style.display = 'none';
                        mapContainer.style.display = 'block';
                        map.invalidateSize();
                    }
                }
            }

            // Verificar al cargar y al cambiar el tamaño
            checkWidth();
            window.addEventListener('resize', checkWidth);
        });
    </script>
</body>

</html>
