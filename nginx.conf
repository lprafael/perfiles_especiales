server {
    listen 3003;
    root /usr/share/nginx/html;
    index index.html;

    # Evitar redirecciones con puerto
    port_in_redirect off;
    absolute_redirect off;

    location / {
        try_files $uri $uri/ /monitoreo_vmt/index.html /index.html;
    }

    location /monitoreo_vmt/ {
        alias /usr/share/nginx/html/monitoreo_vmt/;
        try_files $uri $uri/ /monitoreo_vmt/index.html;
    }

    location /monitoreo_vmt/transbordos {
        proxy_pass http://streamlit:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Acceso local simplificado
    location /transbordos {
        proxy_pass http://streamlit:8501/monitoreo_vmt/transbordos;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }


    # Proxies para el API (siguiendo tu ejemplo funcional)

    location /api/ {
        proxy_pass http://backend:8010/;
    }

    location /monitoreo_vmt/api/ {
        proxy_pass http://backend:8010/;
    }
}
