server {
    listen 3003;
    server_name localhost;
    port_in_redirect off;

    # Compresión gzip para mejor rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend (React)
    # Servimos desde /monitoreo_vmt/ para coincidir con la URL del servidor
    location /monitoreo_vmt/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /monitoreo_vmt/index.html;
    }

    # Redirección de la raíz a la subcarpeta (opcional pero recomendado)
    location = / {
        return 301 /monitoreo_vmt/;
    }

    # PUENTE: Proxy al Backend (ahora bajo la misma subcarpeta)
    location /monitoreo_vmt/api/ {
        proxy_pass http://backend:8010/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
